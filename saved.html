<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>保存したスポット — Wan &amp; Co.</title>
<link rel="stylesheet" href="assets/style.css?v=20260704c">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">🐾</div>
        <div><h1>保存</h1><div class="sub">Saved places</div></div>
      </div>
    </header>

    <div class="pad">
      <div class="eyebrow">MY FAVORITES</div>
      <h2 class="section">保存したスポット <span class="sans" style="font-size:14px;color:var(--muted)" id="count"></span></h2>
      <p class="lead sans">気になるお店を保存して、あとでゆっくり確認できます。</p>
      <div id="cards"></div>
    </div>
  </div>

<script src="assets/config.js?v=20260704c"></script>
<script src="assets/data.js?v=20260704c"></script>
<script src="assets/maps.js?v=20260704c"></script>
<script src="assets/app.js?v=20260704c"></script>
<script>
  (async () => {
    const user = await Data.ready();
    if (!user) { location.href = "index.html"; return; }
    await render();
    mountNav("saved");
  })();

  async function render() {
    const box = $("#cards");
    box.innerHTML = `<div class="empty"><div class="big">🐾</div>読み込み中…</div>`;
    let list = [];
    try { list = await Store.saved(); } catch (e) { toast("データの取得に失敗しました。"); }
    $("#count").textContent = `（${list.length}件）`;
    box.innerHTML = "";
    if (!list.length) {
      box.innerHTML = `<div class="empty"><div class="big">♡</div>まだ保存したスポットはありません。<br>マップやスポット一覧の <b>♡</b> ボタンで保存できます。<br><br><a class="btn btn-ghost" href="list.html" style="max-width:240px;margin:0 auto">スポットを探す</a></div>`;
      return;
    }
    list.forEach(p => {
      const a = document.createElement("a");
      a.href = `place.html?id=${p.id}`; a.className = "card place-card";
      a.style.marginBottom = "16px"; a.style.display = "block";
      a.innerHTML = placeCardHTML(p);
      box.appendChild(a);
    });
    hydrateCardPhotos(box);
    // 保存ボタン（この画面では解除に使える）→ 解除したら再描画
    await wireSaveButtons(box);
    $$(".save-btn", box).forEach(btn => {
      const orig = btn.onclick;
      btn.onclick = async e => { await orig(e); setTimeout(render, 400); };
    });
  }
</script>
</body>
</html>
