<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>„Éû„ÉÉ„Éó ‚Äî Wan &amp; Co.</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">üêæ</div>
        <div>
          <h1>Wan &amp; Co.</h1>
          <div class="sub">Dog-friendly map</div>
        </div>
      </div>
      <button class="iconbtn" id="logout" title="„É≠„Ç∞„Ç¢„Ç¶„Éà">‚èª</button>
    </header>

    <div class="pad" style="padding-bottom:10px">
      <div class="chips" id="cats"></div>
    </div>

    <div class="map-wrap">
      <div id="map"></div>
      <button class="locate-btn" id="locate" title="ÁèæÂú®Âú∞">üìç</button>
    </div>

    <div class="pad">
      <div class="eyebrow">NEARBY</div>
      <h2 class="section">Ëøë„Åè„ÅÆ„Çπ„Éù„ÉÉ„Éà <span class="sans" style="font-size:14px;color:var(--muted)" id="count"></span></h2>
      <div id="cards"></div>
    </div>
  </div>

<script src="assets/config.js"></script>
<script src="assets/data.js"></script>
<script src="assets/maps.js"></script>
<script src="assets/app.js"></script>
<script>
  let activeCat = "all", map = null, places = [];

  $("#logout").addEventListener("click", async () => { await Auth.logout(); location.href = "index.html"; });

  /* ---- category chips ---- */
  const catsEl = $("#cats");
  CATEGORIES.forEach(c => {
    const b = document.createElement("button");
    b.className = "chip" + (c.key === "all" ? " active" : "");
    b.textContent = `${c.icon} ${c.label}`;
    b.onclick = () => { activeCat = c.key; $$(".chip", catsEl).forEach(x => x.classList.remove("active")); b.classList.add("active"); render(); };
    catsEl.appendChild(b);
  });

  /* ---- boot: require login, then load data + map ---- */
  (async () => {
    const user = await Data.ready();
    if (!user) { location.href = "index.html"; return; }
    $("#cards").innerHTML = `<div class="empty"><div class="big">üêæ</div>Ë™≠„ÅøËæº„Åø‰∏≠‚Ä¶</div>`;
    try { places = await Store.visible(); } catch (e) { places = []; toast("„Éá„Éº„Çø„ÅÆÂèñÂæó„Å´Â§±Êïó„Åó„Åæ„Åó„Åü„ÄÇ"); }
    WCMap.ready().then(() => { map = WCMap.create("map", { interactive: true }); render(); });
    render();
  })();

  function filtered() { return places.filter(p => activeCat === "all" || p.category === activeCat); }

  function render() {
    const list = filtered();
    if (map) {
      map.clearMarkers();
      list.forEach(p => {
        if (p.lat == null) return;
        map.addMarker({ lat: p.lat, lng: p.lng }, {
          title: p.name,
          html: `<b>${escapeHtml(p.name)}</b><br>${catLabel(p.category)}<br>
            <a href="place.html?id=${p.id}" style="color:#b48b46">Ë©≥Á¥∞„ÇíË¶ã„Çã ‚Üí</a>`,
        });
      });
    }
    $("#count").textContent = `Ôºà${list.length}‰ª∂Ôºâ`;
    const cards = $("#cards"); cards.innerHTML = "";
    if (!list.length) { cards.innerHTML = `<div class="empty"><div class="big">üêæ</div>„Åì„ÅÆ„Ç´„ÉÜ„Ç¥„É™„ÅÆ„Çπ„Éù„ÉÉ„Éà„ÅØ„Åæ„ÅÝ„ÅÇ„Çä„Åæ„Åõ„Çì„ÄÇ</div>`; return; }
    list.forEach(p => {
      const a = document.createElement("a");
      a.href = `place.html?id=${p.id}`; a.className = "card place-card";
      a.style.marginBottom = "16px"; a.style.display = "block";
      a.innerHTML = placeCardHTML(p);
      cards.appendChild(a);
    });
  }

  /* ---- geolocation ---- */
  $("#locate").addEventListener("click", () => {
    if (!map) return;
    if (!navigator.geolocation) return toast("‰ΩçÁΩÆÊÉÖÂÝ±„ÅåÂà©Áî®„Åß„Åç„Åæ„Åõ„Çì„ÄÇ");
    toast("ÁèæÂú®Âú∞„ÇíÂèñÂæó‰∏≠‚Ä¶");
    navigator.geolocation.getCurrentPosition(
      pos => {
        const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setView(loc, 15);
        map.setYou(loc);
      },
      () => toast("ÁèæÂú®Âú∞„ÇíÂèñÂæó„Åß„Åç„Åæ„Åõ„Çì„Åß„Åó„Åü„ÄÇ"),
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });

  mountNav("map");
</script>
</body>
</html>
