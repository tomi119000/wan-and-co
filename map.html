<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>マップ — Wan &amp; Co.</title>
<link rel="stylesheet" href="assets/style.css?v=20260703c">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">🐾</div>
        <div>
          <h1>Wan &amp; Co.</h1>
          <div class="sub">Dog-friendly map</div>
        </div>
      </div>
      <button class="iconbtn" id="logout" title="ログアウト">⏻</button>
    </header>

    <div class="pad" style="padding-bottom:10px">
      <div class="chips" id="cats"></div>
    </div>

    <div class="map-wrap">
      <div id="map"></div>
      <button class="locate-btn" id="locate" title="現在地">📍</button>
    </div>

    <div class="pad" style="padding-bottom:0">
      <button id="findBtn" class="btn btn-ghost" style="display:none">🔍 このエリアの犬同伴スポットを探す</button>
    </div>

    <div class="pad">
      <div class="eyebrow">NEARBY</div>
      <h2 class="section">近くのスポット <span class="sans" style="font-size:14px;color:var(--muted)" id="count"></span></h2>
      <div id="cards"></div>
    </div>
  </div>

<script src="assets/config.js?v=20260703c"></script>
<script src="assets/data.js?v=20260703c"></script>
<script src="assets/maps.js?v=20260703c"></script>
<script src="assets/app.js?v=20260703c"></script>
<script>
  let activeCat = "all", map = null, places = [];

  $("#logout").addEventListener("click", async () => { await Auth.logout(); location.href = "index.html"; });

  /* ---- category chips ---- */
  const catsEl = $("#cats");
  CATEGORIES.forEach(c => {
    const b = document.createElement("button");
    b.className = "chip" + (c.key === "all" ? " active" : "");
    b.textContent = `${c.icon} ${c.label}`;
    b.onclick = () => { activeCat = c.key; $$(".chip", catsEl).forEach(x => x.classList.remove("active")); b.classList.add("active"); render(); };
    catsEl.appendChild(b);
  });

  /* ---- boot: require login, then load data + map ---- */
  (async () => {
    const user = await Data.ready();
    if (!user) { location.href = "index.html"; return; }
    $("#cards").innerHTML = `<div class="empty"><div class="big">🐾</div>読み込み中…</div>`;
    try { places = await Store.visible(); } catch (e) { places = []; toast("データの取得に失敗しました。"); }
    WCMap.ready().then(() => {
      map = WCMap.create("map", { interactive: true });
      render();
      if (WCMap.canSearch) { $("#findBtn").style.display = "flex"; restoreDiscovery(); } // Google Maps モードのみ
    });
    render();
  })();

  /* ---- Places API: 実在の犬同伴スポットを探す → 取り込み ---- */
  let findResults = [];
  const gpId = pid => "gp_" + String(pid).replace(/[^A-Za-z0-9_-]/g, "").slice(0, 80);

  window.__wcImport = async (i) => {
    const g = findResults[i]; if (!g) return;
    toast("施設を取り込み中…");
    try { const id = await Store.importPlace(g); location.href = `place.html?id=${id}`; }
    catch (e) { toast("取り込みに失敗しました。"); }
  };

  // 発見マーカー（黒ピン）を描画。render() から毎回呼ばれるので、
  // カテゴリ切替や詳細からの「戻る」でも残り続ける。
  function addFindMarkers() {
    if (!map) return;
    findResults.forEach((g, i) => {
      map.addMarker({ lat: g.lat, lng: g.lng }, {
        pin: "find", title: g.name,
        html: `<div style="min-width:190px;font-family:sans-serif">
            <b style="font-size:14px">${escapeHtml(g.name)}</b><br>
            <span style="color:#7d7a72;font-size:12px">${escapeHtml(g.address || "")}</span><br>
            <button onclick="__wcImport(${i})" style="margin-top:8px;background:#1c1f26;color:#fff;border:none;padding:8px 12px;border-radius:8px;cursor:pointer;font-size:13px">この施設で口コミ・チェックイン</button>
          </div>`,
      });
    });
  }

  // 検索結果を保存／復元（詳細ページから戻っても黒ピンを保持）
  function saveDiscovery() {
    try { sessionStorage.setItem("wc_discovery", JSON.stringify({ results: findResults, center: map.center(), ts: Date.now() })); } catch (e) {}
  }
  function restoreDiscovery() {
    try {
      const raw = sessionStorage.getItem("wc_discovery"); if (!raw) return;
      const d = JSON.parse(raw);
      if (!d.results || !d.results.length || (Date.now() - d.ts) > 30 * 60 * 1000) return;
      findResults = d.results.filter(g => !places.some(p => p.id === gpId(g.placeId)));
      if (d.center && map) map.setView(d.center, 14);
      render(); // 黒ピンを再描画
    } catch (e) {}
  }

  $("#findBtn").addEventListener("click", async () => {
    if (!map || !WCMap.canSearch) return;
    const btn = $("#findBtn"); btn.disabled = true; btn.textContent = "検索中…";
    try {
      const results = await WCMap.searchDogFriendly(map.center(), 4000);
      // 既に登録済みの施設は除外
      findResults = results.filter(g => !places.some(p => p.id === gpId(g.placeId)));
      saveDiscovery();
      render(); // ベース＋発見マーカーを描画
      toast(findResults.length ? `${findResults.length}件の候補が見つかりました🐾` : "このエリアでは候補が見つかりませんでした");
    } catch (e) {
      toast(e.message || "検索に失敗しました。");
    }
    btn.disabled = false; btn.textContent = "🔍 このエリアの犬同伴スポットを探す";
  });

  function filtered() { return places.filter(p => activeCat === "all" || p.category === activeCat); }

  function render() {
    const list = filtered();
    if (map) {
      map.clearMarkers();
      list.forEach(p => {
        if (p.lat == null) return;
        map.addMarker({ lat: p.lat, lng: p.lng }, {
          title: p.name,
          html: `<b>${escapeHtml(p.name)}</b><br>${catLabel(p.category)}<br>
            <a href="place.html?id=${p.id}" style="color:#b48b46">詳細を見る →</a>`,
        });
      });
    }
    addFindMarkers(); // 発見マーカー（黒ピン）を base マーカーの上に重ねる
    $("#count").textContent = `（${list.length}件）`;
    const cards = $("#cards"); cards.innerHTML = "";
    if (!list.length) { cards.innerHTML = `<div class="empty"><div class="big">🐾</div>このカテゴリのスポットはまだありません。</div>`; return; }
    list.forEach(p => {
      const a = document.createElement("a");
      a.href = `place.html?id=${p.id}`; a.className = "card place-card";
      a.style.marginBottom = "16px"; a.style.display = "block";
      a.innerHTML = placeCardHTML(p);
      cards.appendChild(a);
    });
    hydrateCardPhotos(cards); // 写真の無い施設は Places API から後埋め
  }

  /* ---- geolocation ---- */
  $("#locate").addEventListener("click", () => {
    if (!map) return;
    if (!navigator.geolocation) return toast("位置情報が利用できません。");
    toast("現在地を取得中…");
    navigator.geolocation.getCurrentPosition(
      pos => {
        const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
        map.setView(loc, 15);
        map.setYou(loc);
      },
      () => toast("現在地を取得できませんでした。"),
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });

  mountNav("map");
</script>
</body>
</html>
