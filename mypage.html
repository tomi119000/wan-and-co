<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>マイページ — Wan &amp; Co.</title>
<link rel="stylesheet" href="assets/style.css?v=20260703b">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">🐾</div>
        <div><h1>マイページ</h1><div class="sub">My page</div></div>
      </div>
      <button class="iconbtn" id="logout" title="ログアウト">⏻</button>
    </header>

    <div class="pad">
      <div class="card pad" style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
        <div class="review" style="padding:0;border:none">
          <div class="avatar" style="width:60px;height:60px;font-size:24px" id="av"></div>
        </div>
        <div>
          <div class="eyebrow" style="margin-bottom:2px">MEMBER</div>
          <div style="font-size:20px" id="uname"></div>
          <div class="sans" style="font-size:13px;color:var(--muted)" id="uemail"></div>
        </div>
      </div>

      <div class="stat-row" style="margin-bottom:24px">
        <div class="stat"><div class="num" id="sPlaces">0</div><div class="lbl">登録スポット</div></div>
        <div class="stat"><div class="num" id="sCheck">0</div><div class="lbl">チェックイン</div></div>
        <div class="stat"><div class="num" id="sRev">0</div><div class="lbl">投稿口コミ</div></div>
      </div>

      <div class="eyebrow">MY SPOTS</div>
      <h2 class="section">登録したスポット</h2>
      <div id="mine"></div>
    </div>
  </div>

<script src="assets/config.js?v=20260703b"></script>
<script src="assets/data.js?v=20260703b"></script>
<script src="assets/app.js?v=20260703b"></script>
<script>
  let user = null;
  $("#logout").addEventListener("click", async () => { await Auth.logout(); location.href = "index.html"; });

  (async () => {
    user = await Data.ready();
    if (!user) { location.href = "index.html"; return; }
    $("#av").textContent = (user.name||"?")[0];
    $("#uname").textContent = user.name;
    $("#uemail").textContent = user.email;
    await render();
    mountNav("my");
  })();

  async function render() {
    const box = $("#mine");
    box.innerHTML = `<div class="empty"><div class="big">🐾</div>読み込み中…</div>`;
    let mine = [], stats = { places: 0, checkins: 0, reviews: 0 };
    try { [mine, stats] = await Promise.all([Store.mine(), Store.myStats()]); }
    catch (e) { toast("データの取得に失敗しました。"); }

    $("#sPlaces").textContent = stats.places;
    $("#sCheck").textContent  = stats.checkins;
    $("#sRev").textContent    = stats.reviews;

    box.innerHTML = "";
    if (!mine.length) {
      box.innerHTML = `<div class="empty"><div class="big">🐾</div>まだ登録がありません。<br>お気に入りの場所を追加しましょう。<br><br><a class="btn btn-gold" href="add.html" style="max-width:240px;margin:0 auto">＋ スポットを登録</a></div>`;
      return;
    }
    mine.forEach(p => {
      const card = document.createElement("div"); card.className = "card"; card.style.marginBottom="16px";
      card.innerHTML = `
        <a href="place.html?id=${p.id}" class="place-card">${placeCardHTML(p)}</a>
        <div class="pad" style="padding-top:0;display:flex;gap:10px">
          <button class="btn btn-ghost btn-sm toggle" data-id="${p.id}" data-vis="${p.visibility}" style="flex:1">
            ${p.visibility==="public"?"🔒 非公開にする":"🌐 公開する"}
          </button>
          <button class="btn btn-danger btn-sm del" data-id="${p.id}">削除</button>
        </div>`;
      box.appendChild(card);
    });

    $$(".toggle").forEach(b => b.onclick = async () => {
      b.disabled = true;
      const next = b.dataset.vis === "public" ? "private" : "public";
      try { await Store.setVisibility(b.dataset.id, next); toast(next==="public"?"公開しました。":"非公開にしました。"); }
      catch (e) { toast("変更に失敗しました。"); }
      await render();
    });
    $$(".del").forEach(b => b.onclick = async () => {
      if (!confirm("このスポットを削除しますか？")) return;
      b.disabled = true;
      try { await Store.remove(b.dataset.id); toast("削除しました。"); }
      catch (e) { toast("削除に失敗しました。"); }
      await render();
    });
  }
</script>
</body>
</html>
