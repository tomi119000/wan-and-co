<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>スポット詳細 — Wan &amp; Co.</title>
<link rel="stylesheet" href="assets/style.css?v=20260704e">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <a href="map.html" class="backlink">‹ 戻る</a>
      <div class="sub" id="src"></div>
    </header>
    <div id="content"></div>
  </div>

<script src="assets/config.js?v=20260704e"></script>
<script src="assets/data.js?v=20260704e"></script>
<script src="assets/maps.js?v=20260704e"></script>
<script src="assets/app.js?v=20260704e"></script>
<script>
  const id = new URLSearchParams(location.search).get("id");

  (async () => {
    const user = await Data.ready();
    if (!user) { location.href = "index.html"; return; }
    $("#content").innerHTML = `<div class="empty"><div class="big">🐾</div>読み込み中…</div>`;
    await load();
    mountNav("map");
  })();

  async function load() {
    let d;
    try { d = await Store.detail(id); } catch (e) { d = null; }
    if (!d) {
      $("#content").innerHTML = `<div class="empty"><div class="big">🐾</div>スポットが見つかりませんでした。<br><br><a class="btn btn-ghost" href="map.html">マップへ戻る</a></div>`;
      return;
    }
    render(d);
  }

  function render(d) {
    const p = d.place;
    $("#src").textContent = p.source === "user" ? "ユーザー登録" : "Google Map掲載";
    const hero = (d.photos && d.photos[0]) || p.cover || "";
    $("#content").innerHTML = `
      ${hero ? `<img class="hero-img" src="${hero}" alt="">` : `<div class="hero-img" id="heroBox" style="background:#ded9cf center/cover no-repeat"></div>`}
      <div class="pad">
        <div class="eyebrow">${catLabel(p.category)}${p.visibility==="private"?" ・ 🔒非公開":""}</div>
        <h2 class="section" style="margin-bottom:8px">${escapeHtml(p.name)}</h2>
        <p class="sans" style="color:var(--muted);margin-top:0">📍 ${escapeHtml(p.address || "住所未登録")}</p>

        <div class="stat-row" style="margin:16px 0 20px">
          <div class="stat"><div class="num">${p.avg?p.avg.toFixed(1):"–"}</div><div class="lbl">評価</div></div>
          <div class="stat"><div class="num">${p.checkinCount||0}</div><div class="lbl">チェックイン</div></div>
          <div class="stat"><div class="num">${p.reviewCount||0}</div><div class="lbl">口コミ</div></div>
        </div>

        ${p.desc ? `<p>${escapeHtml(p.desc)}</p>` : ""}

        <button class="btn btn-gold" id="checkin" style="margin:8px 0 6px" ${d.checkedInToday?"disabled style='opacity:.6'":""}>
          ${d.checkedInToday ? "✓ 本日チェックイン済み" : "✓ ここにチェックインする"}
        </button>
        <button class="btn btn-ghost" id="saveBtn" style="margin:0 0 6px">♡ 保存する</button>
        <p class="hint sans center">同伴ルールを守って、素敵な時間を。</p>

        ${d.photos && d.photos.length > 1 ? `
          <h3 class="section" style="font-size:18px;margin-top:24px">フォト</h3>
          <div class="gallery">${d.photos.map(u=>`<img src="${u}" alt="">`).join("")}</div>` : ""}

        <h3 class="section" style="font-size:18px;margin-top:26px">場所</h3>
        <div class="card"><div id="mini" style="height:200px"></div></div>

        <div id="gReviewsWrap"></div>

        <h3 class="section" style="font-size:18px;margin-top:26px">口コミ（${p.reviewCount||0}）</h3>
        <div class="card pad" style="margin-bottom:16px">
          <div class="field" style="margin-bottom:12px">
            <label>評価</label>
            <select id="rating">
              <option value="5">★★★★★ 最高</option>
              <option value="4">★★★★☆ 良い</option>
              <option value="3">★★★☆☆ 普通</option>
              <option value="2">★★☆☆☆ いまひとつ</option>
              <option value="1">★☆☆☆☆ 残念</option>
            </select>
          </div>
          <div class="field" style="margin-bottom:12px">
            <label>コメント（口コミ）</label>
            <textarea id="ctext" placeholder="愛犬との体験を共有しましょう…"></textarea>
          </div>
          <button class="btn btn-primary" id="postReview">口コミを投稿</button>
        </div>
        <div id="reviews"></div>
      </div>`;

    // hero 写真が無い取り込み施設は Places API から後埋め
    if (!hero && p.placeId && window.WCMap && WCMap.ready) {
      WCMap.ready().then(() => WCMap.fetchPhoto && WCMap.fetchPhoto(p.placeId)).then(url => {
        const hb = document.getElementById("heroBox"); if (hb && url) hb.style.backgroundImage = `url('${url}')`;
      }).catch(() => {});
    }

    // Google の口コミ（ワンちゃん関連を優先・投稿日付き）
    if (p.placeId && window.WCMap && WCMap.ready) {
      WCMap.ready().then(() => WCMap.fetchReviews && WCMap.fetchReviews(p.placeId))
        .then(rv => renderGoogleReviews(rv || [])).catch(() => {});
    }

    // mini map (content was re-rendered, so #mini is a fresh node)
    if (p.lat != null) {
      WCMap.ready().then(() => {
        const mini = WCMap.create("mini", { center: { lat: p.lat, lng: p.lng }, zoom: 15, interactive: false });
        mini.addMarker({ lat: p.lat, lng: p.lng }, { title: p.name });
      });
    } else { $("#mini").innerHTML = '<div class="empty sans">位置情報は登録されていません</div>'; }

    // reviews list
    const rv = $("#reviews");
    rv.innerHTML = (d.reviews && d.reviews.length) ? "" : `<p class="sans" style="color:var(--muted)">まだ口コミがありません。最初の一件を投稿しましょう。</p>`;
    (d.reviews || []).forEach(r => {
      const el = document.createElement("div"); el.className = "review";
      el.innerHTML = `
        <div class="head">
          <div class="avatar">${escapeHtml((r.userName||"?")[0])}</div>
          <div><div class="who">${escapeHtml(r.userName||"ユーザー")}</div><div class="when">${timeAgo(r.at)}</div></div>
        </div>
        ${r.rating?`<div class="stars">${stars(r.rating)}</div>`:""}
        <p class="text">${escapeHtml(r.text||"")}</p>`;
      rv.appendChild(el);
    });

    // actions
    $("#checkin").onclick = async (e) => {
      e.target.disabled = true;
      try {
        const { added } = await Store.checkIn(id);
        toast(added ? "チェックインしました！🐾" : "本日はチェックイン済みです。");
      } catch (err) { toast("チェックインに失敗しました。"); }
      await load();
    };
    $("#postReview").onclick = async (e) => {
      const text = $("#ctext").value.trim();
      if (!text) return toast("コメントを入力してください。");
      e.target.disabled = true;
      try { await Store.addReview(id, { rating: +$("#rating").value, text }); toast("口コミを投稿しました。"); }
      catch (err) { toast("投稿に失敗しました。"); e.target.disabled = false; return; }
      await load();
    };

    // 保存（お気に入り）ボタン
    const sb = $("#saveBtn");
    if (sb && Store.savedIds) {
      const setState = on => { sb.textContent = on ? "♥ 保存済み" : "♡ 保存する"; sb.dataset.on = on ? "1" : ""; };
      Store.savedIds().then(ids => setState(ids.indexOf(p.id) !== -1)).catch(() => {});
      sb.onclick = async () => {
        sb.disabled = true;
        try {
          if (sb.dataset.on) { await Store.unsaveFavorite(p.id); setState(false); toast("保存を解除しました。"); }
          else { await Store.saveFavorite(p.id); setState(true); toast("保存しました ♥"); }
        } catch (e) { toast("保存に失敗しました。"); }
        sb.disabled = false;
      };
    }
  }

  // Google 口コミの描画（ワンちゃん関連を優先・投稿年月日つき）
  function renderGoogleReviews(rv) {
    const wrap = document.getElementById("gReviewsWrap");
    if (!wrap) return;
    if (!rv || !rv.length) { wrap.innerHTML = ""; return; }
    const fmt = ms => ms ? new Date(ms).toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric" }) : "";
    wrap.innerHTML = `
      <h3 class="section" style="font-size:18px;margin-top:26px">Googleの口コミ
        <span class="sans" style="font-size:12px;color:var(--gold)">🐾 ワンちゃん関連を優先</span></h3>
      <div class="card pad" style="margin-bottom:6px">
        ${rv.map(r => `
          <div class="review">
            <div class="head">
              <div class="avatar">${escapeHtml((r.author || "G")[0])}</div>
              <div>
                <div class="who">${escapeHtml(r.author)}${r.dog ? ' <span style="color:var(--gold)">🐾</span>' : ""}</div>
                <div class="when">${fmt(r.dateMs) || escapeHtml(r.rel || "")}</div>
              </div>
            </div>
            ${r.rating ? `<div class="stars">${stars(r.rating)}</div>` : ""}
            <p class="text">${escapeHtml(r.text)}</p>
          </div>`).join("")}
      </div>
      <p class="hint sans" style="margin:0 0 4px">出典: Google マップ</p>`;
  }
</script>
</body>
</html>
