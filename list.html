<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>スポット一覧 — Wan &amp; Co.</title>
<link rel="stylesheet" href="assets/style.css?v=20260704f">
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="mark">🐾</div>
        <div><h1>スポット</h1><div class="sub">All places</div></div>
      </div>
    </header>

    <div class="pad">
      <div class="field" style="margin-bottom:12px">
        <input type="search" id="q" placeholder="🔍 施設名・エリアで検索">
      </div>
      <div class="field" style="margin-bottom:14px">
        <select id="area">
          <!-- エリア選択肢はJSで生成 -->
        </select>
      </div>
      <div class="chips" id="cats" style="margin-bottom:16px"></div>
      <div id="cards"></div>
    </div>
  </div>

<script src="assets/config.js?v=20260704f"></script>
<script src="assets/data.js?v=20260704f"></script>
<script src="assets/maps.js?v=20260704f"></script>
<script src="assets/app.js?v=20260704f"></script>
<script>
  let activeCat = "all", q = "", area = "all", places = [];

  const catsEl = $("#cats");
  CATEGORIES.forEach(c => {
    const b = document.createElement("button");
    b.className = "chip" + (c.key === "all" ? " active" : "");
    b.textContent = `${c.icon} ${c.label}`;
    b.onclick = () => { activeCat = c.key; $$(".chip", catsEl).forEach(x=>x.classList.remove("active")); b.classList.add("active"); render(); };
    catsEl.appendChild(b);
  });

  // エリア絞り込みドロップダウン
  const areaEl = $("#area");
  AREAS.forEach(a => { const o = document.createElement("option"); o.value = a.key; o.textContent = a.label; areaEl.appendChild(o); });
  areaEl.addEventListener("change", e => { area = e.target.value; render(); });

  $("#q").addEventListener("input", e => { q = e.target.value.trim().toLowerCase(); render(); });

  (async () => {
    const user = await Data.ready();
    if (!user) { location.href = "index.html"; return; }
    $("#cards").innerHTML = `<div class="empty"><div class="big">🐾</div>読み込み中…</div>`;
    try { places = await Store.visible(); } catch (e) { places = []; toast("データの取得に失敗しました。"); }
    render();
  })();

  function render() {
    const list = places.filter(p =>
      (activeCat === "all" || p.category === activeCat) &&
      inArea(p, area) &&
      (!q || (p.name + " " + (p.address||"")).toLowerCase().includes(q))
    );
    const cards = $("#cards"); cards.innerHTML = "";
    if (!list.length) { cards.innerHTML = `<div class="empty"><div class="big">🔍</div>該当するスポットがありません。</div>`; return; }
    list.forEach(p => {
      const a = document.createElement("a");
      a.href = `place.html?id=${p.id}`; a.className = "card place-card"; a.style.marginBottom="16px"; a.style.display="block";
      a.innerHTML = placeCardHTML(p);
      cards.appendChild(a);
    });
    hydrateCardPhotos(cards); // 写真の無い施設は Places API から後埋め
    wireSaveButtons(cards);   // 保存ボタンを配線
  }
  mountNav("list");
</script>
</body>
</html>
